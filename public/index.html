<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop - Home</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <a href="index.html" class="brand">My Shop</a>
        <div id="user-status"></div>
        <!-- Shopping Cart Trigger -->
        <div class="cart-wrapper">
            <span class="shopping-list-trigger">Shopping List (Total: $0.0)</span>
            
            <!-- Dropdown Content -->
            <div class="shopping-list shopping-list-content">
                <p class="cart-empty">Cart is empty</p>
            </div>
        </div>
    </header>    

    <div class="container">
        <!-- Sidebar Navigation -->
        <aside>
            <nav>
                <h3>Categories</h3>
                <!-- Just an empty UL with the correct class name -->
                <ul class="category-list">
                    <!-- JavaScript will insert <li> items here automatically -->
                    <li>Loading categories...</li>
                </ul>
            </nav>
        </aside>
        <!-- Main Content -->
        <main>
            <!-- Breadcrumbs -->
            <nav class="breadcrumbs" id="breadcrumb-nav">
                <a href="#" id="bc-home-init">Home</a> &gt; All Products
            </nav>

            <!-- Product Grid Container -->
            <section class="product-grid" id="product-container">
                <!-- Products injected here by JS -->
                <p>Loading products...</p>
            </section>
        </main>
    </div>

    <footer>
        Lam Leung Yiu 1155192972
        <!-- Phase 6-1: Social Plugin -->
        <div class="social-share">
            <a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fs14.ierg4210.iecuhk.cc"
               target="_blank" rel="noopener noreferrer" class="social-link facebook">
               📘 Share on Facebook
            </a>
        </div>
    </footer>

    <!-- Link to JS -->
    <script src="/js/main.js"></script>
    <script src="/js/userStatus.js"></script>
</body>
</html>
