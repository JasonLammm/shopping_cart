<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - My Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <header>
    <a href="/" class="brand">My Shop</a>
  </header>

  <main>
    <div class="login-card">
      <h2>Login</h2>

      <p id="login-error" class="error-msg"></p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required maxlength="255" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required maxlength="128" autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 My Shop. All rights reserved.</p>
  </footer>

  <script src="/js/login.js"></script>
</body>
</html>
