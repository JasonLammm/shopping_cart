<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css" />
  <!-- NOTE: Google Fonts requires updating CSP — see server.js additions -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <h1>Admin Panel</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="admin.html">Admin</a>
    </nav>

    <!-- CATEGORY MANAGEMENT -->
    <div class="section" id="category-section">
      <h2>Manage Categories</h2>

      <form id="add-category-form">
        <div class="form-group">
          <label for="cat-name-input">New Category Name</label>
          <!-- XSS FIX: added maxlength, pattern, title -->
          <input
            type="text"
            id="cat-name-input"
            required
            maxlength="100"
            pattern="[A-Za-z0-9 \-_]+"
            title="Only letters, numbers, spaces, hyphens and underscores allowed"
            placeholder="e.g. Electronics"
          />
        </div>
        <button type="submit">Add Category</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="category-table-body"><!-- Populated by JS --></tbody>
      </table>
    </div>

    <!-- PRODUCT MANAGEMENT -->
    <div class="section" id="product-section">
      <h2>Manage Products</h2>

      <div id="product-form-container">
        <h3 id="form-title">Add New Product</h3>
        <form id="product-form" enctype="multipart/form-data">
          <input type="hidden" id="prod-id" value="" />

          <div class="form-group">
            <label for="prod-cat">Category</label>
            <select id="prod-cat" required></select>
          </div>

          <div class="form-group">
            <label for="prod-name">Name</label>
            <!-- XSS FIX: added maxlength -->
            <input
              type="text"
              id="prod-name"
              required
              maxlength="255"
              placeholder="Product Name"
            />
          </div>

          <div class="form-group">
            <label for="prod-price">Price</label>
            <!-- XSS FIX: added min, max -->
            <input
              type="number"
              id="prod-price"
              step="0.01"
              min="0.01"
              max="999999.99"
              required
              placeholder="0.00"
            />
          </div>

          <div class="form-group">
            <label for="prod-desc">Description</label>
            <!-- XSS FIX: added maxlength -->
            <textarea
              id="prod-desc"
              rows="3"
              maxlength="1000"
              placeholder="Product description (max 1000 characters)"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="prod-image">Image</label>
            <!-- XSS FIX: restricted accept types explicitly -->
            <input
              type="file"
              id="prod-image"
              accept="image/jpeg,image/png,image/gif,image/webp"
            />
            <p id="current-image-text" class="hidden">
              Current Image: <span id="img-name"></span>
            </p>
          </div>

          <button type="submit" id="submit-btn">Save Product</button>
          <button type="button" id="cancel-btn" class="hidden">Cancel Edit</button>
        </form>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="product-table-body"><!-- Populated by JS --></tbody>
      </table>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
