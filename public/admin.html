<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – My Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Admin Panel</h1>
    <nav>
      <a href="/">← Back to Shop</a>
    </nav>
    <div id="user-status"></div>
  </header>

  <div class="container">

    <!-- ── CATEGORY SECTION ── -->
    <section class="section">
      <h2>Categories</h2>

      <form id="add-category-form">
        <div class="form-group">
          <label for="cat-name-input">Category Name</label>
          <input type="text" id="cat-name-input" placeholder="e.g. Electronics"
                 maxlength="100" required>
        </div>
        <button type="submit">Add Category</button>
      </form>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="category-table-body">
          <tr><td colspan="3">Loading...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- ── PRODUCT SECTION ── -->
    <section class="section" id="product-form-container">
      <h2 id="form-title">Add New Product</h2>

      <form id="product-form" enctype="multipart/form-data">
        <input type="hidden" id="prod-id">

        <div class="form-group">
          <label for="prod-cat">Category</label>
          <select id="prod-cat" required>
            <option value="">-- Select Category --</option>
          </select>
        </div>

        <div class="form-group">
          <label for="prod-name">Product Name</label>
          <input type="text" id="prod-name" placeholder="Product name"
                 maxlength="255" required>
        </div>

        <div class="form-group">
          <label for="prod-price">Price (USD)</label>
          <input type="number" id="prod-price" placeholder="0.00"
                 min="0.01" max="999999.99" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="prod-desc">Description</label>
          <textarea id="prod-desc" placeholder="Optional description"
                    maxlength="1000"></textarea>
        </div>

        <div class="form-group">
          <label for="prod-image">Product Image</label>
          <input type="file" id="prod-image" accept="image/jpeg,image/png,image/gif,image/webp">
          <span id="current-image-text" class="hidden">
            Current image: <span id="img-name"></span>
          </span>
        </div>

        <button type="submit" id="submit-btn">Save Product</button>
        <button type="button" id="cancel-btn" class="hidden">Cancel</button>
      </form>
    </section>

    <!-- ── PRODUCTS TABLE SECTION ── -->
    <section class="section">
      <h2>All Products</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="product-table-body">
          <tr><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </section>

  </div>

  <footer>
    <p>&copy; 2026 My Shop. All rights reserved.</p>
  </footer>

  <script src="/js/admin.js"></script>
  <script src="/js/userStatus.js"></script>
</body>
</html>
