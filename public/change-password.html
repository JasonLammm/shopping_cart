<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password – My Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>

  <header>
    <a href="/" class="brand">My Shop</a>
  </header>

  <main>
    <div class="register-card">
      <h2>Change Password</h2>

      <p id="cp-error"   class="error-msg"></p>
      <p id="cp-success" class="success-msg"></p>

      <form id="cp-form" novalidate>
        <div class="form-group">
          <label for="current-password">Current Password</label>
          <input type="password" id="current-password" required maxlength="128" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" required minlength="8" maxlength="128" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirm-new-password">Confirm New Password</label>
          <input type="password" id="confirm-new-password" required maxlength="128" autocomplete="new-password">
        </div>
        <button type="submit" class="register-btn">Change Password</button>
      </form>

      <p class="login-link">
        <a href="/">← Back to Shop</a>
      </p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 My Shop. All rights reserved.</p>
  </footer>

  <script src="/js/userStatus.js"></script>
  <script src="/js/change-password.js"></script>
</body>
</html>
